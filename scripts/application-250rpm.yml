# GPLink application.yml 调参片段 - 250 msg/min × 100 采集项 = 417 rows/s
# 将以下配置合并到 application.yml 对应节点（覆盖同名 key）
#
# 推算依据：
#   rows/s = 250 × 100 / 60 ≈ 417
#   chunk 目标行数 = RAM × 25% / 100B
#     16GB → 40M 行 / 417 ≈ 26.6h → chunk: 1d
#     32GB → 80M 行 / 417 ≈ 53.3h → chunk: 2d
#
# cagg 策略：start=2h, end=1h → 每次只刷新上一个完整小时（1h~2h 前）
#   不重算历史，不触碰仍在写入的当前小时，窗口最小化

spring:
  r2dbc:
    pool:
      max-size: 16

timescaledb:
  things-data:
    chunk-time-interval: 1d      # 16GB RAM 选此值
    # chunk-time-interval: 2d    # 32GB RAM 选此值
    compress: true
    compress-after: 30d
    cagg:
      enabled: true
      refresh-interval: 1h       # 每小时刷新一次（每次只刷上一个完整小时）
      start-offset: 2h           # 满足 start > end(1h) + refresh(1h) = 2h 约束
      end-offset: 1h             # 跳过当前正在写入的小时，只刷已完成的 bucket
      retention: 3y
      daily-enabled: true
      daily-start-offset: 3d
      monthly-enabled: true
  write-buffer:
    parallelism: 2
    size: 500
    timeout: 2s
    mvstore-cache-mb: 8
