# GPLink application.yml 调参片段 - 500 msg/min × 100 采集项 = 833 rows/s
# 将以下配置合并到 application.yml 对应节点（覆盖同名 key）
#
# 推算依据：
#   rows/s = 500 × 100 / 60 ≈ 833
#   chunk 目标行数 = RAM × 25% / 100B
#     16GB → 40M 行 / 833 ≈ 13.3h → chunk: 12h
#     32GB → 80M 行 / 833 ≈ 26.7h → chunk: 1d
#
# cagg 策略：start=2h, end=1h → 每次只刷新上一个完整小时（1h~2h 前）

spring:
  r2dbc:
    pool:
      max-size: 16

timescaledb:
  things-data:
    chunk-time-interval: 12h     # 16GB RAM 选此值
    # chunk-time-interval: 1d    # 32GB RAM 选此值
    compress: true
    compress-after: 30d
    cagg:
      enabled: true
      refresh-interval: 1h
      start-offset: 2h
      end-offset: 1h
      retention: 3y
      daily-enabled: true
      daily-start-offset: 3d
      monthly-enabled: true
  write-buffer:
    parallelism: 2
    size: 500
    timeout: 2s
    mvstore-cache-mb: 8
