# GPLink application.yml 调参片段 - 3000 msg/min × 100 采集项 = 5000 rows/s
# 将以下配置合并到 application.yml 对应节点（覆盖同名 key）
#
# 推算依据：
#   rows/s = 3000 × 100 / 60 ≈ 5000
#   chunk 目标行数 = RAM × 25% / 100B
#     16GB → 40M 行 / 5000 ≈ 8,000s ≈ 2.2h → chunk: 2h
#     32GB → 80M 行 / 5000 ≈ 16,000s ≈ 4.4h → chunk: 4h
#   高写入：end_offset 提升至 3h 确保 cagg 只处理完整且稳定的数据块

spring:
  r2dbc:
    pool:
      max-size: 32

timescaledb:
  things-data:
    chunk-time-interval: 2h      # 16GB RAM 选此值
    # chunk-time-interval: 4h    # 32GB RAM 选此值
    compress: true
    compress-after: 30d
    cagg:
      enabled: true
      refresh-interval: 2h
      start-offset: 6h           # 满足 start > end(3h) + refresh(2h) = 5h 约束
      end-offset: 3h             # 高写入：跳过最近 3h，大幅减少 invalidation log 处理
      retention: 3y
      daily-enabled: true
      daily-start-offset: 3d
      monthly-enabled: true
  write-buffer:
    parallelism: 4
    size: 1000
    timeout: 1s
    mvstore-cache-mb: 8
