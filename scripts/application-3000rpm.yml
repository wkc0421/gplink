# GPLink application.yml 调参片段 - 3000 msg/min × 100 采集项 = 5000 rows/s
# 将以下配置合并到 application.yml 对应节点（覆盖同名 key）
#
# 推算依据：
#   rows/s = 3000 × 100 / 60 ≈ 5000
#   chunk 目标行数 = RAM × 25% / 100B
#     16GB → 40M 行 / 5000 ≈ 2.2h → chunk: 2h
#     32GB → 80M 行 / 5000 ≈ 4.4h → chunk: 4h
#
# cagg 策略：start=2h, end=1h → 每次只刷新上一个完整小时（1h~2h 前）

spring:
  r2dbc:
    pool:
      max-size: 32

timescaledb:
  things-data:
    chunk-time-interval: 2h      # 16GB RAM 选此值
    # chunk-time-interval: 4h    # 32GB RAM 选此值
    compress: true
    compress-after: 30d
    cagg:
      enabled: true
      refresh-interval: 1h
      start-offset: 2h
      end-offset: 1h
      retention: 3y
      daily-enabled: true
      daily-start-offset: 3d
      monthly-enabled: true
  write-buffer:
    parallelism: 4
    size: 1000
    timeout: 1s
    mvstore-cache-mb: 8
